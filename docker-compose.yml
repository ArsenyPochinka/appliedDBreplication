services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk

  master-db:
    image: postgres:16
    environment:
      POSTGRES_DB: master
      POSTGRES_USER: master
      POSTGRES_PASSWORD: master
    ports:
      - "5433:5432"

  slave-db:
    image: postgres:16
    environment:
      POSTGRES_DB: slave
      POSTGRES_USER: slave
      POSTGRES_PASSWORD: slave
    ports:
      - "5434:5432"

  service-master:
    build:
      context: .
      dockerfile: service-master/Dockerfile
    depends_on:
      - master-db
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://master-db:5432/master
      SPRING_DATASOURCE_USERNAME: master
      SPRING_DATASOURCE_PASSWORD: master
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"

  service-receiver:
    build:
      context: .
      dockerfile: service-receiver/Dockerfile
    depends_on:
      - slave-db
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://slave-db:5432/slave
      SPRING_DATASOURCE_USERNAME: slave
      SPRING_DATASOURCE_PASSWORD: slave
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
